version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
    networks:
      - whatsreal-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatsreal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsreal-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsreal-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/Frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - whatsreal-network

volumes:
  postgres_data:
  redis_data:

networks:
  whatsreal-network:
    driver: bridge
